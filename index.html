<style>
  :root{
    --bg: #f4f5f3;
    --surface: #ffffff;
    --ink: #1c2321;
    --ink-soft: #5b645f;
    --line: #e3e6e2;
    --accent: #2f6f5e;
    --accent-soft: #e6efec;
    --amber: #b8721f;
    --amber-soft: #fbeedd;
    --red: #a8382c;
    --red-soft: #f8e9e7;
    --blue: #2b5a8c;
    --blue-soft: #e8eef5;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(28,35,33,0.04), 0 6px 20px rgba(28,35,33,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Vazirmatn', sans-serif;min-height:100vh;}
  .wrap{max-width:920px;margin:0 auto;padding:26px 16px 60px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .brand h1{font-size:16px;font-weight:700;margin:0;}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);font-weight:500;}
  .role-switch{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;}

  .gate{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:26px;}

  .gate p{color:var(--ink-soft);margin:0;font-size:13.5px;max-width:340px;}
  .gate-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

  .gate-card .ic{font-size:26px;margin-bottom:10px;}

  .login-wrap{min-height:82vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}

  .a-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
  .a-ok{color:var(--accent);border-color:var(--accent-soft);}
  .a-edit{color:var(--blue);border-color:var(--blue-soft);}
  .a-reject{color:var(--red);border-color:var(--red-soft);}
  .note{font-size:11.5px;color:var(--ink-soft);margin-top:6px;background:#fafafa;padding:6px 10px;border-radius:8px;}

  .tabs button.active{background:var(--bg);color:var(--ink);}
  .empty{text-align:center;padding:36px 10px;color:var(--ink-soft);font-size:13px;}

  .stat b{display:block;font-size:22px;font-weight:800;}
  .stat span{font-size:10.5px;color:var(--ink-soft);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th,td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line);}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}

  .bar-fill{height:100%;background:var(--accent);border-radius:99px;}
  .bar-count{width:26px;text-align:left;font-weight:700;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
// fallback: اگر فایل خارج از محیط آرتیفکت Claude باز شود، window.storage در دسترس نیست.
// در آن حالت داده‌ها فقط روی همان مرورگر ذخیره می‌شوند (بدون اشتراک بین افراد).
if (!window.storage) {
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem((shared?'shared:':'local:')+key);
      if (raw === null) throw new Error('key not found');
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem((shared?'shared:':'local:')+key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem((shared?'shared:':'local:')+key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = (shared?'shared:':'local:')+(prefix||'');
      const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice((shared?'shared:':'local:').length));
      return { keys, prefix, shared: !!shared };
    }
  };
}

const { useState, useEffect, useRef, useCallback } = React;

/* ---------- اتصال به گوگل شیت ---------- */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbx69ToVN-iY0opjKoC1P-DV3TUpDBmZ4fHhLTpAMyRaukCA5e4vXqlgo3lPAhG1PlnZ/exec';

function loginWithSheet(username, password){
  return new Promise((resolve, reject) => {
    const callbackName = '__loginCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    let finished = false;

    const cleanup = () => {
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
    };

    const timer = setTimeout(() => {
      if (finished) return;
      finished = true;
      cleanup();
      reject(new Error('timeout'));
    }, 15000);

    window[callbackName] = (result) => {
      if (finished) return;
      finished = true;
      clearTimeout(timer);
      cleanup();
      resolve(result || {success:false, message:'پاسخ نامعتبر از سرور'});
    };

    script.onerror = () => {
      if (finished) return;
      finished = true;
      clearTimeout(timer);
      cleanup();
      reject(new Error('network'));
    };

    const query = new URLSearchParams({
      username: String(username || '').trim(),
      password: String(password || '').trim(),
      callback: callbackName,
      _: String(Date.now())
    });
    script.src = SHEET_URL + '?' + query.toString();
    document.body.appendChild(script);
  });
}

async function sendToSheet(t){
  try{
    const now = new Date(t.createdAt || Date.now());
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors', // چون Apps Script برای مرورگر هدر CORS برنمی‌گرداند؛ پاسخ را نمی‌خوانیم ولی داده می‌رسد
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        date: now.toLocaleDateString('fa-IR'),
        time: now.toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'}),
        storeCode: t.storeCode || '',
        technician: t.technician || '',
        type: t.type || '',
        level1: t.level1 || '',
        level2: t.level2 || [],
        otherText: t.otherText || '',
        consumedParts: t.consumedParts || [],
        hotParts: t.hotParts || [],
        outsourceReason: t.outsourceReason || '',
        reviewStatus: t.reviewStatus || '',
        managerNote: t.managerNote || '',
      })
    });
  }catch(e){
    // ارسال به گوگل شیت ناموفق بود (مثلاً قطعی اینترنت)؛ داده همچنان در خود پلتفرم امن است
  }
}

/* ---------- داده‌های واقعی کسب‌وکار (برگرفته از فایل تیکت.xlsx و فلوچارت) ---------- */

const CATEGORIES = [
  { l1:"کرکره/درب اتوماتیک/درب معمولی", l2:["موتور","تیغه","ریموت","جاقفلی","ریل","چشمی‌ها","فریم","لولا","شیشه","دستگیره","آرام‌بند"] },
  { l1:"بالابر", l2:["موتور و مشکلات برقی","بدنه و کف و ادوات فلزی","کابل‌های برقی","تسمه فلزی","نشت روغن","دکمه‌ها و سنسور"] },
  { l1:"یخچال و فریزر سطح فروش", l2:["خاموشی","دما","پرده شب","روشنایی","مشکلات برقی","درین","فن کابین","کندانسور","برفک","شیشه و درب","بدنه","صدای ناهنجار"] },
  { l1:"اسپلیت", l2:["دما","کنترل","کندانسور","آبریزی بیرون","آبریزی داخلی و درین","سرویس"] },
  { l1:"هیتر گازی", l2:["لوله دودکش","شلنگ و اتصالات","خاموش بودن","قطع گاز","پایه","محل نصب"] },
  { l1:"تابلو کامپوزیت و متعلقات برقی", l2:["حروف چلنیوم","روشنایی چلنیوم","کد و نوشته برچسبی","لامپ زیر تابلو","پرژکتور","لایت باکس","روشنایی لایت باکس","اتصال برق","شکستگی کامپوزیت","آب‌بندی"] },
  { l1:"روشنایی و لامپ سطح فروشگاه", l2:["لامپ سطح فروشگاه","لامپ دپو و انبار","لامپ سرویس","کمبود نور"] },
  { l1:"ایرادات برقی، کابل‌کشی و تابلو برق", l2:["قطع و اتصالی برق","خرابی فیوز","کنتور","داکت‌کشی","آویزان بودن"] },
  { l1:"UPS", l2:["باتری و شارژ","اتصالی و قطع"] },
  { l1:"ملزومات رفاهی پرسنلی", l2:["چای‌ساز","ماکروویو","یخچال پرسنلی","کمد","میز و صندلی"] },
  { l1:"مانیتور دوربین‌ها", l2:["خاموش بودن","کنترل","شکستگی","تصویر"] },
  { l1:"ادوات تاسیسات آب و فاضلاب", l2:["لوله‌کشی","شیرآلات","سینک و فاضلاب","پمپ","فلاش تانک","تصفیه آب","نشت آب لوله‌کشی و فاضلاب"] },
  { l1:"ملزومات فلزی", l2:["پله فلزی","روکش آجدار پله","رمپ","پل","بالکن یا شاسی فلزی"] },
  { l1:"ابنیه سطح فروشگاه/تهویه", l2:["دیوارها","سرامیک‌ها","رنگ‌آمیزی","سقف کاذب","سقف گچی","سرویس بهداشتی","پله سنگی","هواکش‌ها","نم و رطوبت"] },
  { l1:"سایر موارد", l2:[] },
];

const OUTSOURCE_REASONS = [
  "عدم وجود توانائی همکار فنی",
  "عدم وجود ابزار فنی مورد نیاز برای این تعمیرات",
  "عدم امکان تامین قطعه در محل به‌دلیل نقدینگی و تنخواه",
  "عدم امکان تامین قطعه به‌دلیل در دسترس نبودن قطعه در این لوکیشن",
  "عدم وجود زمان کافی به‌علت زمان‌بر بودن جزئیات تعمیرات",
  "عدم وجود زمان کافی به‌علت حجم تعمیرات در دیگر فروشگاه‌ها",
  "عدم وجود زمان کافی برای سفارش قطعه تا ارسال (عدم موجودی انبار)",
  "فاصله زیاد از اعزام تا محل فروشگاه (عیب‌یابی اولیه تلفنی و دور از فروشگاه)",
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toLocaleDateString('fa-IR'); }
function dateKey(iso){ return new Date(iso).toLocaleDateString('fa-IR'); }
function timeStr(iso){ return new Date(iso).toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'}); }

function Toast({msg}){ return React.createElement('div',{className:'toast'+(msg?' show':'')}, msg||''); }

/* ---------- یک ساب‌فرم قابل استفاده در ثبت (فنی) و ویرایش (مدیر) ---------- */
function TicketFields({ draft, setDraft }){
  const setType = (type) => setDraft(d => ({...d, type, level1:'', level2:[], otherText:'', outsourceReason:'', consumedParts:[], hotParts:[]}));
  const setLevel1 = (l1) => setDraft(d => ({...d, level1:l1, level2:[], otherText:''}));
  const toggleLevel2 = (item) => setDraft(d => ({...d, level2: d.level2.includes(item) ? d.level2.filter(x=>x!==item) : [...d.level2, item]}));
  const cat = CATEGORIES.find(c => c.l1 === draft.level1);

  const addPart = (field) => setDraft(d => ({...d, [field]: [...d[field], {name:'', qty:1}]}));
  const updatePart = (field, idx, key, val) => setDraft(d => {
    const arr = d[field].slice(); arr[idx] = {...arr[idx], [key]: val}; return {...d, [field]: arr};
  });
  const removePart = (field, idx) => setDraft(d => ({...d, [field]: d[field].filter((_,i)=>i!==idx)}));

  return React.createElement(React.Fragment, null,
    React.createElement('label',null,'نوع کار'),
    React.createElement('div',{className:'choice-row'},
      React.createElement('div',{className:'choice'+(draft.type==='internal'?' sel-internal':''), onClick:()=>setType('internal')},
        React.createElement('b',null,'درون‌سپاری'), React.createElement('span',null,'خودم انجام می‌دهم')

function emptyDraft(){
  return { type:'', level1:'', level2:[], otherText:'', outsourceReason:'', consumedParts:[], hotParts:[] };
}

function validDraft(d){
  if (d.type==='outsourced') return !!d.outsourceReason;
  if (d.type==='internal') return !!d.level1 && (d.level1!=='سایر موارد' || d.otherText.trim());
  return false;
}

/* ---------- نمایش خلاصه‌ی یک تیکت ---------- */
function ticketSummary(t){
  if (t.type==='outsourced') return 'علت برون‌سپاری: ' + t.outsourceReason;
  const l2 = t.level2 && t.level2.length ? ' («' + t.level2.join('، ') + '»)' : '';
  const other = t.level1==='سایر موارد' && t.otherText ? ': ' + t.otherText : '';
  const parts = [];
  if (t.consumedParts && t.consumedParts.filter(p=>p.name).length) parts.push('قطعات مصرفی: ' + t.consumedParts.filter(p=>p.name).map(p=>p.name+' ×'+p.qty).join('، '));
  if (t.hotParts && t.hotParts.filter(p=>p.name).length) parts.push('قطعات داغی: ' + t.hotParts.filter(p=>p.name).map(p=>p.name+' ×'+p.qty).join('، '));
  return t.level1 + other + l2 + (parts.length ? ' — ' + parts.join(' | ') : '');
}

    setLoading(true);
    setError('');
    try{
      const result = await loginWithSheet(username, password);
      if(result && result.success){
        onLogin({
          username: String(result.username || username).trim(),
          name: String(result.name || '').trim(),
          role: result.role === 'manager' ? 'manager' : 'technician'
        });
      }else{

function App(){
  const [currentUser, setCurrentUser] = useState(() => {
    try{
      const raw = sessionStorage.getItem('ticketing-user');
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  });
  const [tasks, setTasks] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const toastTimer = useRef(null);

  const role = currentUser ? (currentUser.role === 'manager' ? 'manager' : 'tech') : null;
  const showToast = (m) => { setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToastMsg(''), 2200); };

  const handleLogin = (user) => {
    sessionStorage.setItem('ticketing-user', JSON.stringify(user));
    setCurrentUser(user);
  };

  const logout = () => {
    sessionStorage.removeItem('ticketing-user');
    setCurrentUser(null);
    setTasks([]);
    setLoaded(false);
  };

  const loadTasks = useCallback(async () => {
    try{ const res = await window.storage.get('tasks', true); setTasks(res ? JSON.parse(res.value) : []); }
    catch(e){ setTasks([]); }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if(!currentUser) return;
    loadTasks();
    const iv = setInterval(loadTasks, 6000);
    return () => clearInterval(iv);
  }, [currentUser, loadTasks]);

  const saveTasks = async (updater) => {
    let current = [];
    try{ const res = await window.storage.get('tasks', true); current = res ? JSON.parse(res.value) : []; } catch(e){ current = []; }
    const next = updater(current);
    await window.storage.set('tasks', JSON.stringify(next), true);
    setTasks(next);
    return next;
  };

  if (!currentUser) {
    return React.createElement(LoginView,{onLogin:handleLogin});
  }

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'top'},
      React.createElement('div',{className:'brand'},
        React.createElement('span',{className:'dot'}),
        React.createElement('div',null,
          React.createElement('h1',null,'پشتیبانی فنی فروشگاه‌ها'),
          React.createElement('span',null,role==='tech'?'محیط نیروی فنی':'محیط مدیر فنی')
        )
      ),
      React.createElement('div',{className:'user-bar'},
        React.createElement('div',{className:'user-info'},
          React.createElement('b',null,currentUser.name),
          React.createElement('span',null,role==='manager'?'مدیر فنی':'کد پرسنلی: '+currentUser.username)
        ),
        React.createElement('button',{className:'logout-btn',onClick:logout},'خروج')
      )
    ),
    !loaded ? React.createElement('div',{className:'empty'},'در حال بارگذاری...') :
    (role==='tech'
      ? React.createElement(TechView,{tasks, saveTasks, showToast, currentUser})
      : React.createElement(ManagerView,{tasks, saveTasks, showToast})
    ),
    React.createElement(Toast,{msg:toastMsg})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
