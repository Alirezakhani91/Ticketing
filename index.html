<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پلتفرم پشتیبانی فنی فروشگاه‌ها</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f4f5f3;
    --surface: #ffffff;
    --ink: #1c2321;
    --ink-soft: #5b645f;
    --line: #e3e6e2;
    --accent: #2f6f5e;
    --accent-soft: #e6efec;
    --amber: #b8721f;
    --amber-soft: #fbeedd;
    --red: #a8382c;
    --red-soft: #f8e9e7;
    --blue: #2b5a8c;
    --blue-soft: #e8eef5;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(28,35,33,0.04), 0 6px 20px rgba(28,35,33,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Vazirmatn', sans-serif;min-height:100vh;}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 16px 60px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .brand h1{font-size:16px;font-weight:700;margin:0;}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);font-weight:500;}
  .role-switch{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;}
  .role-switch button{border:none;background:transparent;padding:7px 14px;border-radius:999px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .role-switch button.active{background:var(--ink);color:#fff;}

  .gate{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:26px;}
  .gate h2{font-size:21px;margin:0;font-weight:800;}
  .gate p{color:var(--ink-soft);margin:0;font-size:13.5px;max-width:340px;}
  .gate-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .gate-card{width:190px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 16px;cursor:pointer;transition:.18s;box-shadow:var(--shadow);}
  .gate-card:hover{transform:translateY(-3px);border-color:var(--accent);}
  .gate-card .ic{font-size:26px;margin-bottom:10px;}
  .gate-card b{font-size:14px;display:block;margin-bottom:4px;}
  .gate-card span{font-size:11.5px;color:var(--ink-soft);}

  .login-wrap{min-height:82vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}
  .login-card{width:100%;max-width:390px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px;}
  .login-head{text-align:center;margin-bottom:22px;}
  .login-icon{width:54px;height:54px;border-radius:16px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:25px;margin:0 auto 12px;}
  .login-head h2{font-size:19px;margin:0 0 6px;font-weight:800;}
  .login-head p{font-size:12px;color:var(--ink-soft);margin:0;line-height:1.9;}
  .login-error{background:var(--red-soft);color:var(--red);border-radius:9px;padding:9px 11px;font-size:12px;margin-bottom:12px;text-align:center;}
  .user-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .user-info{text-align:left;direction:rtl;}
  .user-info b{display:block;font-size:12px;}
  .user-info span{display:block;font-size:10.5px;color:var(--ink-soft);}
  .logout-btn{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:9px;padding:7px 11px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
  .fixed-user{background:var(--accent-soft);border:1px solid #d7e7e1;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
  .fixed-user b{display:block;font-size:13px;}
  .fixed-user span{display:block;font-size:10.5px;color:var(--ink-soft);margin-top:2px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
  .card h3{margin:0 0 4px;font-size:14.5px;font-weight:700;}
  .card .sub{margin:0 0 14px;font-size:11.5px;color:var(--ink-soft);}
  label{display:block;font-size:12px;color:var(--ink-soft);margin:0 0 5px;font-weight:600;}
  input,select,textarea{width:100%;font-family:inherit;font-size:13.5px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#fbfbfa;color:var(--ink);margin-bottom:12px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  textarea{resize:vertical;min-height:64px;}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
  .btn-primary{background:var(--ink);color:#fff;width:100%;}
  .btn-primary:hover{background:#000;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .btn-line{background:#fff;border:1px solid var(--line);color:var(--ink);width:100%;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);font-size:11.5px;padding:5px 10px;border-radius:8px;cursor:pointer;}

  /* انتخاب نوع کار */
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  @media(max-width:480px){.choice-row{grid-template-columns:1fr;}}
  .choice{border:1.5px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;text-align:center;transition:.12s;}
  .choice b{display:block;font-size:13px;margin-bottom:2px;}
  .choice span{font-size:11px;color:var(--ink-soft);}
  .choice.sel-internal{border-color:var(--accent);background:var(--accent-soft);}
  .choice.sel-outsourced{border-color:var(--blue);background:var(--blue-soft);}

  .radio-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .radio-item{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:12.5px;}
  .radio-item.checked{border-color:var(--blue);background:var(--blue-soft);}
  .radio-item input{width:auto;margin:2px 0 0;flex-shrink:0;}

  .chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .chip{border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12px;cursor:pointer;background:#fff;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}

  .part-row{display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:center;margin-bottom:8px;}
  .part-row input{margin-bottom:0;}
  .rm-btn{border:none;background:var(--red-soft);color:var(--red);border-radius:8px;width:34px;height:34px;font-size:14px;cursor:pointer;}
  .add-part{border:1px dashed var(--line);background:transparent;color:var(--ink-soft);border-radius:9px;padding:8px;width:100%;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px;}

  .visit-banner{display:flex;justify-content:space-between;align-items:center;background:var(--ink);color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;}
  .visit-banner b{font-size:15px;}
  .visit-banner button{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-family:inherit;font-size:11px;cursor:pointer;}

  .task{border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:10px;}
  .task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .task-store{font-weight:800;font-size:13.5px;}
  .task-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .task-desc{font-size:12.5px;color:var(--ink);margin:8px 0;line-height:2;}
  .task-desc b{font-weight:700;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .b-internal{background:var(--accent-soft);color:var(--accent);}
  .b-outsourced{background:var(--blue-soft);color:var(--blue);}
  .review-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-inline-start:6px;}
  .r-pending{background:var(--amber-soft);color:var(--amber);}
  .r-reviewed{background:var(--accent-soft);color:var(--accent);}
  .r-rejected{background:var(--red-soft);color:var(--red);}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .a-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
  .a-ok{color:var(--accent);border-color:var(--accent-soft);}
  .a-edit{color:var(--blue);border-color:var(--blue-soft);}
  .a-reject{color:var(--red);border-color:var(--red-soft);}
  .note{font-size:11.5px;color:var(--ink-soft);margin-top:6px;background:#fafafa;padding:6px 10px;border-radius:8px;}

  .tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border:1px solid var(--line);padding:4px;border-radius:12px;}
  .tabs button{flex:1;border:none;background:transparent;padding:9px 4px;border-radius:9px;font-family:inherit;font-weight:700;font-size:12px;color:var(--ink-soft);cursor:pointer;}
  .tabs button.active{background:var(--bg);color:var(--ink);}
  .empty{text-align:center;padding:36px 10px;color:var(--ink-soft);font-size:13px;}

  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;}
  .stat b{display:block;font-size:22px;font-weight:800;}
  .stat span{font-size:10.5px;color:var(--ink-soft);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th,td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line);}
  th{color:var(--ink-soft);font-weight:700;font-size:11px;}
  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-row input,.filter-row select{width:auto;margin:0;flex:1;min-width:120px;}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
  .bar-label{width:150px;flex-shrink:0;color:var(--ink-soft);}
  .bar-track{flex:1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent);border-radius:99px;}
  .bar-count{width:26px;text-align:left;font-weight:700;}



  /* شناسایی خودکار فروشگاه */
  .store-lookup{margin-top:-2px;margin-bottom:12px;min-height:54px;}
  .store-search-status{display:flex;align-items:center;gap:8px;border:1px dashed var(--line);background:#fafafa;border-radius:11px;padding:11px 12px;color:var(--ink-soft);font-size:11.5px;}
  .store-search-status.loading:before{content:'';width:13px;height:13px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);animation:storeSpin .8s linear infinite;}
  @keyframes storeSpin{to{transform:rotate(360deg)}}
  .store-found{border:1px solid #cfe1db;background:var(--accent-soft);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .store-found b{display:block;font-size:13px;margin-bottom:3px;}
  .store-found span{display:block;font-size:10.5px;color:var(--ink-soft);}
  .store-code-badge{background:#fff;border:1px solid rgba(47,111,94,.18);border-radius:9px;padding:7px 10px;font-size:11px;font-weight:800;white-space:nowrap;color:var(--accent);}
  .store-invalid{border:1px solid #efd2ce;background:var(--red-soft);border-radius:11px;padding:10px 12px;color:var(--red);font-size:11.5px;font-weight:600;}
  .store-submeta{font-size:10px;color:var(--ink-soft);margin-top:3px;}
  .region-name{font-weight:700;color:var(--accent);}

  /* داشبورد مدیریتی */
  .dashboard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .dashboard-title h2{font-size:21px;margin:0 0 5px;font-weight:800;}
  .dashboard-title p{margin:0;color:var(--ink-soft);font-size:12px;}
  .refresh-btn{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 13px;font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;}
  .refresh-btn:disabled{opacity:.55;cursor:not-allowed;}
  .dashboard-filters{display:grid;grid-template-columns:1.2fr repeat(6,1fr);gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:16px;box-shadow:var(--shadow);}
  .dashboard-filters select,.dashboard-filters input{margin:0;min-width:0;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .kpi{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow);min-height:104px;}
  .kpi:after{content:'';position:absolute;width:66px;height:66px;border-radius:50%;left:-22px;bottom:-28px;background:var(--accent-soft);opacity:.72;}
  .kpi.blue:after{background:var(--blue-soft);}.kpi.amber:after{background:var(--amber-soft);}.kpi.red:after{background:var(--red-soft);}
  .kpi-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .kpi-label{font-size:11px;color:var(--ink-soft);font-weight:700;}
  .kpi-icon{font-size:17px;}
  .kpi-value{display:block;font-size:28px;font-weight:800;margin-top:10px;line-height:1;}
  .kpi-note{display:block;font-size:10px;color:var(--ink-soft);margin-top:7px;}
  .dash-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;margin-bottom:14px;}
  .dash-grid.equal{grid-template-columns:1fr 1fr;}
  .dash-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);min-width:0;}
  .dash-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:13px;}
  .dash-card-head h3{font-size:14px;margin:0 0 3px;}
  .dash-card-head p{font-size:10.5px;color:var(--ink-soft);margin:0;}
  .chart-wrap{position:relative;height:280px;direction:ltr;}
  .chart-wrap.small{height:245px;}
  .leader-list{display:flex;flex-direction:column;gap:9px;}
  .leader-item{display:grid;grid-template-columns:34px minmax(120px,1.5fr) 1fr 62px;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:8px 0;}
  .leader-item:last-child{border-bottom:none;}
  .rank{width:28px;height:28px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .rank.top{background:var(--amber-soft);color:var(--amber);}
  .leader-name b{display:block;font-size:12px;}.leader-name span{font-size:10px;color:var(--ink-soft);}
  .mini-track{height:7px;border-radius:99px;background:var(--bg);overflow:hidden;}
  .mini-fill{height:100%;border-radius:99px;background:var(--accent);}
  .leader-total{text-align:left;font-weight:800;font-size:13px;}
  .leader-total span{display:block;font-size:9px;color:var(--ink-soft);font-weight:500;}
  .store-table-wrap{overflow:auto;max-height:360px;}
  .store-table{min-width:520px;}
  .status-pill{display:inline-flex;padding:3px 8px;border-radius:99px;font-size:9.5px;font-weight:700;}
  .status-good{background:var(--accent-soft);color:var(--accent);}.status-warn{background:var(--amber-soft);color:var(--amber);}.status-bad{background:var(--red-soft);color:var(--red);}
  .attention-list{display:flex;flex-direction:column;gap:8px;}
  .attention{border:1px solid var(--line);border-radius:10px;padding:10px 11px;display:flex;justify-content:space-between;gap:10px;align-items:center;}
  .attention b{font-size:11.5px;display:block;}.attention span{font-size:9.5px;color:var(--ink-soft);}
  .dash-empty{padding:48px 20px;text-align:center;color:var(--ink-soft);font-size:12px;}
  .dashboard-meta{font-size:10px;color:var(--ink-soft);margin-top:4px;}
  @media(max-width:900px){.dashboard-filters{grid-template-columns:repeat(2,1fr)}.kpi-grid{grid-template-columns:repeat(2,1fr)}.dash-grid,.dash-grid.equal{grid-template-columns:1fr}}
  @media(max-width:520px){.dashboard-filters{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}.kpi{min-height:94px;padding:13px}.kpi-value{font-size:23px}.leader-item{grid-template-columns:30px 1fr 54px}.leader-item .mini-track{display:none}.chart-wrap{height:240px}}


  /* وضعیت انجام و پایان برون‌سپاری */
  .work-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin-inline-start:5px;white-space:nowrap;}
  .work-open{background:var(--amber-soft);color:var(--amber);}
  .work-done{background:var(--accent-soft);color:var(--accent);}
  .outsource-open-card{border:1px solid #ead4b6;background:linear-gradient(180deg,#fff,#fffaf4);border-radius:12px;padding:14px;margin-bottom:10px;}
  .outsource-open-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .outsource-open-head b{font-size:13px;display:block;}
  .outsource-open-head span{font-size:10.5px;color:var(--ink-soft);}
  .completion-box{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;}
  .completion-note{background:var(--accent-soft);border-radius:9px;padding:8px 10px;font-size:11.5px;margin-top:8px;line-height:1.9;}
  .section-title-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
  .count-pill{font-size:10px;font-weight:800;background:var(--amber-soft);color:var(--amber);padding:4px 9px;border-radius:99px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
// fallback: اگر فایل خارج از محیط آرتیفکت Claude باز شود، window.storage در دسترس نیست.
// در آن حالت داده‌ها فقط روی همان مرورگر ذخیره می‌شوند (بدون اشتراک بین افراد).
if (!window.storage) {
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem((shared?'shared:':'local:')+key);
      if (raw === null) throw new Error('key not found');
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem((shared?'shared:':'local:')+key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem((shared?'shared:':'local:')+key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = (shared?'shared:':'local:')+(prefix||'');
      const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice((shared?'shared:':'local:').length));
      return { keys, prefix, shared: !!shared };
    }
  };
}

const { useState, useEffect, useRef, useCallback } = React;

/* ---------- اتصال به گوگل شیت ---------- */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxbMta1nOpWgXT_ZB_9UjP6syt4gjLS7AUqhAtZ-mBj5l014WXrHv3iB8cLJpoFVYLC/exec';

function jsonpRequest(params, timeoutMs=20000){
  return new Promise((resolve, reject) => {
    const callbackName = '__ticketing_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    let finished = false;
    const cleanup = () => {
      if(script.parentNode) script.parentNode.removeChild(script);
      try{ delete window[callbackName]; }catch(e){ window[callbackName] = undefined; }
    };
    const timer = setTimeout(() => {
      if(finished) return; finished = true; cleanup(); reject(new Error('timeout'));
    }, timeoutMs);
    window[callbackName] = result => {
      if(finished) return; finished = true; clearTimeout(timer); cleanup(); resolve(result || {success:false});
    };
    script.onerror = () => {
      if(finished) return; finished = true; clearTimeout(timer); cleanup(); reject(new Error('network'));
    };
    const query = new URLSearchParams({...params, callback:callbackName, _:String(Date.now())});
    script.src = SHEET_URL + '?' + query.toString();
    document.body.appendChild(script);
  });
}

function loginWithSheet(username, password){
  return jsonpRequest({action:'login', username:String(username||'').trim(), password:String(password||'').trim()});
}

function fetchManagerTickets(token){
  return jsonpRequest({action:'tickets', token:String(token||'')}, 30000);
}
function fetchTechnicianTickets(token){
  return jsonpRequest({action:'myTickets', token:String(token||'')}, 30000);
}

function lookupStoreWithSheet(code, token){
  return jsonpRequest({action:'store', code:String(code||'').trim(), token:String(token||'')}, 25000);
}

async function sendOutsourceCompletion(ticket, completion, token){
  await fetch(SHEET_URL, {
    method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      action:'completeOutsource', token:String(token||''), rowNumber:ticket.rowNumber,
      completionNote:completion.completionNote||'', completionParts:completion.completionParts||[]
    })
  });
}

async function sendManagerUpdate(ticket, token){
  await fetch(SHEET_URL, {
    method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'updateTicket', token, rowNumber:ticket.rowNumber,
      type:ticket.type, level1:ticket.level1||'', level2:ticket.level2||[], otherText:ticket.otherText||'',
      consumedParts:ticket.consumedParts||[], hotParts:ticket.hotParts||[], outsourceReason:ticket.outsourceReason||'',
      reviewStatus:ticket.reviewStatus||'', managerNote:ticket.managerNote||''})
  });
}

async function sendToSheet(t){
  try{
    const now = new Date(t.createdAt || Date.now());
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors', // چون Apps Script برای مرورگر هدر CORS برنمی‌گرداند؛ پاسخ را نمی‌خوانیم ولی داده می‌رسد
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        date: now.toLocaleDateString('fa-IR'),
        time: now.toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'}),
        storeCode: t.storeCode || '',
        technician: t.technician || '',
        type: t.type || '',
        level1: t.level1 || '',
        level2: t.level2 || [],
        otherText: t.otherText || '',
        consumedParts: t.consumedParts || [],
        hotParts: t.hotParts || [],
        outsourceReason: t.outsourceReason || '',
        reviewStatus: t.reviewStatus || '',
        managerNote: t.managerNote || '',
        id: t.id || '',
        createdAt: t.createdAt || '',
        technicianCode: t.technicianCode || '',
        storeName: t.storeName || '',
        region: t.region || '',
        workStatus: t.workStatus || '',
        completedAt: t.completedAt || '',
        token: t.token || '',
      })
    });
  }catch(e){
    // ارسال به گوگل شیت ناموفق بود (مثلاً قطعی اینترنت)؛ داده همچنان در خود پلتفرم امن است
  }
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toLocaleDateString('fa-IR'); }
function dateKey(iso){ return new Date(iso).toLocaleDateString('fa-IR'); }
function timeStr(iso){ return new Date(iso).toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'}); }
function normalizeStoreCodeClient(v){ return String(v||'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/\s+/g,'').toUpperCase(); }

function Toast({msg}){ return React.createElement('div',{className:'toast'+(msg?' show':'')}, msg||''); }

function TicketFields({ draft, setDraft }){
  const setType = (type) => setDraft(d => ({
    ...d,
    type,
    outsourceReason: type==='outsourced' ? d.outsourceReason : '',
    consumedParts: type==='internal' ? d.consumedParts : [],
    hotParts: type==='internal' ? d.hotParts : []
  }));
  const setLevel1 = (l1) => setDraft(d => ({...d, level1:l1, level2:[], otherText:''}));
  const toggleLevel2 = (item) => setDraft(d => ({...d, level2: d.level2.includes(item) ? d.level2.filter(x=>x!==item) : [...d.level2, item]}));
  const cat = CATEGORIES.find(c => c.l1 === draft.level1);

  const addPart = (field) => setDraft(d => ({...d, [field]: [...d[field], {name:'', qty:1}]}));
  const updatePart = (field, idx, key, val) => setDraft(d => {
    const arr = d[field].slice();
    arr[idx] = {...arr[idx], [key]: key==='qty' ? Math.max(1,Number(val)||1) : val};
    return {...d, [field]: arr};
  });
  const removePart = (field, idx) => setDraft(d => ({...d, [field]: d[field].filter((_,i)=>i!==idx)}));

  return React.createElement(React.Fragment, null,
    React.createElement('label',null,'مرحله ۲ — نوع اصلی خرابی یا خدمات (سطح ۱)'),
    React.createElement('select',{value:draft.level1,onChange:e=>setLevel1(e.target.value)},
      React.createElement('option',{value:''},'انتخاب کنید...'),
      CATEGORIES.map(c=>React.createElement('option',{key:c.l1,value:c.l1},c.l1))
    ),

    draft.level1==='سایر موارد' && React.createElement(React.Fragment,null,
      React.createElement('label',null,'شرح خرابی یا خدمت'),
      React.createElement('textarea',{value:draft.otherText,onChange:e=>setDraft(d=>({...d,otherText:e.target.value})),placeholder:'شرح مورد را وارد کنید...'})
    ),

    cat && cat.l2.length>0 && React.createElement(React.Fragment,null,
      React.createElement('label',null,'مرحله ۳ — نوع فرعی خرابی یا خدمات (سطح ۲) — می‌توانید چند مورد را انتخاب کنید'),
      React.createElement('div',{className:'chip-grid'},
        cat.l2.map(item=>React.createElement('div',{key:item,className:'chip'+(draft.level2.includes(item)?' on':''),onClick:()=>toggleLevel2(item)},item))
      )
    ),

    React.createElement('label',null,'مرحله ۴ — نحوه انجام کار'),
    React.createElement('div',{className:'choice-row'},
      React.createElement('div',{className:'choice'+(draft.type==='internal'?' sel-internal':''),onClick:()=>setType('internal')},
        React.createElement('b',null,'درون‌سپاری'),React.createElement('span',null,'توسط کارشناس فنی انجام شده')
      ),
      React.createElement('div',{className:'choice'+(draft.type==='outsourced'?' sel-outsourced':''),onClick:()=>setType('outsourced')},
        React.createElement('b',null,'برون‌سپاری'),React.createElement('span',null,'ارجاع به پیمانکار یا نیروی بیرونی')
      )
    ),

    draft.type==='outsourced' && React.createElement(React.Fragment,null,
      React.createElement('label',null,'علت برون‌سپاری'),
      React.createElement('div',{className:'radio-list'},
        OUTSOURCE_REASONS.map((r,i)=>React.createElement('label',{key:i,className:'radio-item'+(draft.outsourceReason===r?' checked':'')},
          React.createElement('input',{type:'radio',name:'reason',checked:draft.outsourceReason===r,onChange:()=>setDraft(d=>({...d,outsourceReason:r}))}),
          React.createElement('span',null,(i+1)+'. '+r)
        ))
      )
    ),

    draft.type==='internal' && React.createElement(React.Fragment,null,
      React.createElement('label',null,'قطعات مصرفی (اختیاری)'),
      draft.consumedParts.map((p,idx)=>React.createElement('div',{key:idx,className:'part-row'},
        React.createElement('input',{placeholder:'نام قطعه',value:p.name,onChange:e=>updatePart('consumedParts',idx,'name',e.target.value)}),
        React.createElement('input',{type:'number',min:1,value:p.qty,onChange:e=>updatePart('consumedParts',idx,'qty',e.target.value)}),
        React.createElement('button',{type:'button',className:'rm-btn',onClick:()=>removePart('consumedParts',idx)},'✕')
      )),

        React.createElement('input',{type:'number',min:1,value:p.qty,onChange:e=>updatePart('hotParts',idx,'qty',e.target.value)}),
        React.createElement('button',{type:'button',className:'rm-btn',onClick:()=>removePart('hotParts',idx)},'✕')
      )),

}

function emptyDraft(){
  return {type:'',level1:'',level2:[],otherText:'',outsourceReason:'',consumedParts:[],hotParts:[]};
}

function validDraft(d){
  if(!d.level1)return false;
  if(d.level1==='سایر موارد'&&!String(d.otherText||'').trim())return false;
  const cat=CATEGORIES.find(c=>c.l1===d.level1);
  if(cat&&cat.l2.length>0&&(!d.level2||d.level2.length===0))return false;
  if(!d.type)return false;
  if(d.type==='outsourced'&&!d.outsourceReason)return false;
  return true;
}

function OutsourceOpenItem({t,onComplete}){
  const [open,setOpen]=useState(false);
  const [note,setNote]=useState('');
  const [parts,setParts]=useState([]);
  const [submitting,setSubmitting]=useState(false);
  const addPart=()=>setParts(x=>[...x,{name:'',qty:1}]);
  const updatePart=(idx,key,val)=>setParts(x=>x.map((p,i)=>i===idx?{...p,[key]:key==='qty'?Math.max(1,Number(val)||1):val}:p));
  const removePart=idx=>setParts(x=>x.filter((_,i)=>i!==idx));
  const submit=async()=>{
    if(!note.trim())return;
    setSubmitting(true);
    try{await onComplete(t,{completionNote:note.trim(),completionParts:parts.filter(p=>p.name)});setOpen(false);setNote('');setParts([]);}finally{setSubmitting(false);}
  };
  return React.createElement('div',{className:'outsource-open-card'},
    React.createElement('div',{className:'outsource-open-head'},
      React.createElement('div',null,
        React.createElement('b',null,t.storeName||('فروشگاه '+t.storeCode)),
        React.createElement('span',null,'کد '+t.storeCode+(t.region?' · '+t.region:'')+' · '+(t.level1||'بدون عنوان'))
      ),
      React.createElement('span',{className:'work-badge work-open'},'در حال انجام')
    ),
    React.createElement('div',{className:'task-desc'},ticketSummary(t)),
    !t.rowNumber
      ? React.createElement('div',{className:'note'},'در حال همگام‌سازی با سرور...')
      : !open
        ? React.createElement('button',{className:'a-btn a-ok',onClick:()=>setOpen(true)},'✓ ثبت پایان کار')
        : React.createElement('div',{className:'completion-box'},
            React.createElement('label',null,'شرح اقدام انجام‌شده و نتیجه نهایی'),
            React.createElement('textarea',{value:note,onChange:e=>setNote(e.target.value),placeholder:'مثلاً: پیمانکار مراجعه کرد، موتور تعویض و عملکرد نهایی تست شد...'}),
            React.createElement('label',null,'قطعات مصرفی در پایان کار (اختیاری)'),
            parts.map((p,idx)=>React.createElement('div',{key:idx,className:'part-row'},
              React.createElement('input',{placeholder:'نام قطعه',value:p.name,onChange:e=>updatePart(idx,'name',e.target.value)}),
              React.createElement('input',{type:'number',min:1,value:p.qty,onChange:e=>updatePart(idx,'qty',e.target.value)}),
              React.createElement('button',{type:'button',className:'rm-btn',onClick:()=>removePart(idx)},'✕')
            )),
            React.createElement('button',{type:'button',className:'add-part',onClick:addPart},'+ افزودن قطعه'),
            React.createElement('div',{className:'actions'},
              React.createElement('button',{className:'a-btn a-ok',disabled:submitting||!note.trim(),onClick:submit},submitting?'در حال ثبت...':'ثبت پایان کار'),
              React.createElement('button',{className:'a-btn',disabled:submitting,onClick:()=>setOpen(false)},'انصراف')
            )
          )
  );
}

/* ---------- محیط نیروی فنی ---------- */
function TechView({ tasks, saveTasks, showToast, currentUser, refreshTasks }){
  const name=currentUser.name;
  const [storeCode,setStoreCode]=useState('');
  const [storeInfo,setStoreInfo]=useState(null);
  const [storeLoading,setStoreLoading]=useState(false);
  const [storeError,setStoreError]=useState('');
  const [visitActive,setVisitActive]=useState(false);
  const [visitCount,setVisitCount]=useState(0);
  const [draft,setDraft]=useState(emptyDraft());
  const [askMore,setAskMore]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const normalizedCode=normalizeStoreCodeClient(storeCode);

  useEffect(()=>{
    if(visitActive)return;
    setStoreInfo(null);setStoreError('');
    if(!normalizedCode)return;
    let cancelled=false;
    const timer=setTimeout(async()=>{
      setStoreLoading(true);
      try{
        const result=await lookupStoreWithSheet(normalizedCode,currentUser.token);
        if(cancelled)return;
        if(result&&result.success&&result.store){setStoreInfo(result.store);setStoreError('');}
        else{setStoreInfo(null);setStoreError((result&&result.message)||'کد فروشگاه پیدا نشد');}
      }catch(e){if(!cancelled){setStoreInfo(null);setStoreError('ارتباط با فهرست فروشگاه‌ها برقرار نشد');}}
      finally{if(!cancelled)setStoreLoading(false);}
    },500);
    return()=>{cancelled=true;clearTimeout(timer);};
  },[normalizedCode,visitActive,currentUser.token]);

  const startVisit=()=>{
    if(!normalizedCode){showToast('کد فروشگاه الزامی است');return;}
    if(storeLoading){showToast('چند لحظه تا شناسایی فروشگاه صبر کنید');return;}
    if(!storeInfo||normalizeStoreCodeClient(storeInfo.code)!==normalizedCode){showToast('فقط کد معتبر فروشگاه قابل انتخاب است');return;}
    setStoreCode(storeInfo.code);setVisitActive(true);setVisitCount(0);setDraft(emptyDraft());setAskMore(false);
  };

  const submitItem=async()=>{
    if(!validDraft(draft)){showToast('لطفاً همه مراحل ثبت کار را کامل کنید');return;}
    if(!storeInfo){showToast('اطلاعات فروشگاه پیدا نشد');return;}
    setSubmitting(true);
    const createdAt=new Date().toISOString();
    const newTicket={
      id:uid(),storeCode:storeInfo.code,storeName:storeInfo.name,region:storeInfo.region,
      technician:name.trim(),technicianCode:currentUser.username,token:currentUser.token,
      createdAt,reviewStatus:'pending',managerNote:'',
      workStatus:draft.type==='outsourced'?'open':'completed',
      completedAt:draft.type==='internal'?createdAt:'',...draft
    };
    try{
      await saveTasks(list=>[newTicket,...list]);
      await sendToSheet(newTicket);
      setVisitCount(c=>c+1);setDraft(emptyDraft());setAskMore(true);
      showToast(draft.type==='outsourced'?'برون‌سپاری ثبت و در فهرست کارهای باز قرار گرفت':'کار با موفقیت ثبت شد');
      setTimeout(refreshTasks,1200);
    }finally{setSubmitting(false);}
  };

  const completeOutsource=async(ticket,completion)=>{
    await saveTasks(list=>list.map(t=>t.id===ticket.id?{...t,workStatus:'completed',completedAt:new Date().toISOString(),...completion}:t));
    await sendOutsourceCompletion(ticket,completion,currentUser.token);
    showToast('پایان کار برون‌سپاری ثبت شد');
    setTimeout(refreshTasks,1000);
  };

  const endVisit=()=>{setVisitActive(false);setStoreCode('');setStoreInfo(null);setStoreError('');setAskMore(false);setVisitCount(0);};
  const addAnother=()=>{setAskMore(false);setDraft(emptyDraft());};
  const mine=tasks.filter(t=>String(t.technicianCode||'')===String(currentUser.username)||t.technician===name).slice(0,20);
  const openOutsources=tasks.filter(t=>(String(t.technicianCode||'')===String(currentUser.username)||t.technician===name)&&t.type==='outsourced'&&t.workStatus!=='completed');

  const storeResult=storeLoading
    ? React.createElement('div',{className:'store-search-status loading'},'در حال شناسایی فروشگاه...')
    : storeInfo
      ? React.createElement('div',{className:'store-found'},
          React.createElement('div',null,React.createElement('b',null,storeInfo.name),React.createElement('span',null,'منطقه: ',React.createElement('strong',{className:'region-name'},storeInfo.region))),
          React.createElement('div',{className:'store-code-badge'},storeInfo.code))
      : storeError?React.createElement('div',{className:'store-invalid'},storeError)
      : React.createElement('div',{className:'store-search-status'},'کد را وارد کنید تا نام فروشگاه و منطقه خودکار نمایش داده شود');

  const openSection=React.createElement('div',{className:'card'},
    React.createElement('div',{className:'section-title-row'},React.createElement('div',null,React.createElement('h3',null,'برون‌سپاری‌های باز من'),React.createElement('p',{className:'sub',style:{marginBottom:0}},'بعد از اتمام کار پیمانکار، پایان کار را از همین بخش ثبت کنید')),React.createElement('span',{className:'count-pill'},openOutsources.length+' مورد باز')),
    openOutsources.length===0?React.createElement('div',{className:'empty'},'برون‌سپاری بازی ندارید ✨'):openOutsources.map(t=>React.createElement(OutsourceOpenItem,{key:t.id,t,onComplete:completeOutsource}))
  );

  if(!visitActive){
    return React.createElement(React.Fragment,null,
      React.createElement('div',{className:'card'},
        React.createElement('h3',null,'مرحله ۱ — انتخاب فروشگاه'),

function ticketSummary(t){
  const l2=t.level2&&t.level2.length?' («'+t.level2.join('، ')+'»)':'';
  const other=t.level1==='سایر موارد'&&t.otherText?': '+t.otherText:'';
  const chunks=[(t.level1||'بدون عنوان')+other+l2];
  if(t.type==='outsourced'&&t.outsourceReason)chunks.push('علت برون‌سپاری: '+t.outsourceReason);
  if(t.consumedParts&&t.consumedParts.filter(p=>p.name).length)chunks.push('قطعات مصرفی: '+t.consumedParts.filter(p=>p.name).map(p=>p.name+' ×'+p.qty).join('، '));
  if(t.hotParts&&t.hotParts.filter(p=>p.name).length)chunks.push('قطعات داغی: '+t.hotParts.filter(p=>p.name).map(p=>p.name+' ×'+p.qty).join('، '));
  return chunks.join(' — ');
}

function ticketDate(t){return normalizeFaDigits(t.dateText || (t.createdAt?dateKey(t.createdAt):''));}
function reviewLabel(v){return v==='reviewed'?'بررسی‌شده':v==='rejected'?'ردشده':'در انتظار';}
function pct(n,d){return d?Math.round(n/d*100):0;}
function countBy(list,keyFn){const out={};list.forEach(x=>{const k=keyFn(x);if(k)out[k]=(out[k]||0)+1;});return out;}
function sortedEntries(obj,limit){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit||999);}

    h('span',{className:'status-pill '+(x.pending?'status-warn':'status-bad')},x.pending?x.pending+' معوق':pct(x.outsourced,x.total)+'٪ برون‌سپاری')

  const people=h('div',{className:'dash-grid'},

    h('div',{className:'dash-card'},h('div',{className:'dash-card-head'},h('div',null,h('h3',null,'علل اصلی برون‌سپاری'),h('p',null,'موانع پرتکرار اجرای داخلی'))),reasonRows.length?h(ChartBox,{type:'bar',data:reasonData,options:barOptions}):h('div',{className:'dash-empty'},'برون‌سپاری ثبت نشده است'))

    return h('tr',{key:r.store},h('td',null,i+1),h('td',null,h('b',null,r.store),h('div',{className:'store-submeta'},r.name)),h('td',null,r.region||'—'),h('td',null,r.total),h('td',null,r.internal),h('td',null,r.outsourced),h('td',null,r.pending),h('td',null,h('span',{className:'status-pill '+cls},lab)));

/* ---------- اپ اصلی ---------- */
function LoginView({ onLogin }){
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async () => {
    if(!username.trim() || !password.trim()){
      setError('کد پرسنلی و رمز عبور را وارد کنید');
      return;
    }
    setLoading(true);
    setError('');
    try{
      const result = await loginWithSheet(username, password);
      if(result && result.success){
        onLogin({
          username: String(result.username || username).trim(),
          name: String(result.name || '').trim(),
          role: result.role === 'manager' ? 'manager' : 'technician',
          token: String(result.token || '')
        });
      }else{
        setError((result && result.message) || 'نام کاربری یا رمز عبور اشتباه است');
      }
    }catch(e){
      setError('ارتباط با سرور برقرار نشد؛ اینترنت را بررسی کنید');
    }finally{
      setLoading(false);
    }
  };

  const onKeyDown = (e) => {
    if(e.key === 'Enter' && !loading) submit();
  };

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'login-wrap'},
      React.createElement('div',{className:'login-card'},
        React.createElement('div',{className:'login-head'},
          React.createElement('div',{className:'login-icon'},'🧰'),
          React.createElement('h2',null,'ورود به پشتیبانی فنی'),
          React.createElement('p',null,'با کد پرسنلی و رمز اختصاصی خود وارد شوید')
        ),
        error && React.createElement('div',{className:'login-error'},error),
        React.createElement('label',null,'کد پرسنلی'),
        React.createElement('input',{
          value:username,
          onChange:e=>setUsername(e.target.value),
          onKeyDown,
          inputMode:'numeric',
          autoComplete:'username',
          placeholder:'کد پرسنلی'
        }),
        React.createElement('label',null,'رمز عبور'),
        React.createElement('input',{
          type:'password',
          value:password,
          onChange:e=>setPassword(e.target.value),
          onKeyDown,
          inputMode:'numeric',
          autoComplete:'current-password',
          placeholder:'رمز ۶ رقمی'
        }),
        React.createElement('button',{
          className:'btn btn-primary',
          disabled:loading,
          onClick:submit
        },loading?'در حال بررسی...':'ورود')
      )
    )
  );
}

/* ---------- اپ اصلی ---------- */
function App(){
  const [currentUser,setCurrentUser]=useState(()=>{try{const raw=sessionStorage.getItem('ticketing-user');return raw?JSON.parse(raw):null;}catch(e){return null;}});
  const [tasks,setTasks]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [managerLoading,setManagerLoading]=useState(false);
  const [lastUpdated,setLastUpdated]=useState('');
  const [toastMsg,setToastMsg]=useState('');
  const toastTimer=useRef(null);
  const role=currentUser?(currentUser.role==='manager'?'manager':'tech'):null;
  const showToast=m=>{setToastMsg(m);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToastMsg(''),2600);};

  const handleLogin=user=>{sessionStorage.setItem('ticketing-user',JSON.stringify(user));setCurrentUser(user);setLoaded(false);};
  const logout=()=>{sessionStorage.removeItem('ticketing-user');setCurrentUser(null);setTasks([]);setLoaded(false);};

  const loadTasks=useCallback(async()=>{
    if(!currentUser)return;
    if(currentUser.role==='manager'){
      if(!currentUser.token){logout();return;}
      setManagerLoading(true);
      try{
        const result=await fetchManagerTickets(currentUser.token);
        if(result&&result.success){setTasks(result.tickets||[]);setLastUpdated(result.updatedAt||new Date().toISOString());setLoaded(true);}
        else if(result&&result.sessionExpired){showToast(result.message||'دوباره وارد شوید');logout();}
        else{showToast((result&&result.message)||'دریافت داده‌ها انجام نشد');setLoaded(true);}
      }catch(e){showToast('ارتباط با داده‌های مدیریتی برقرار نشد');setLoaded(true);}
      finally{setManagerLoading(false);}
    }else{
      if(!currentUser.token){logout();return;}
      try{
        const result=await fetchTechnicianTickets(currentUser.token);
        if(result&&result.success){setTasks(result.tickets||[]);setLastUpdated(result.updatedAt||new Date().toISOString());setLoaded(true);}
        else if(result&&result.sessionExpired){showToast(result.message||'دوباره وارد شوید');logout();}
        else{showToast((result&&result.message)||'دریافت کارهای شما انجام نشد');setLoaded(true);}
      }catch(e){
        try{const res=await window.storage.get('tasks',true);setTasks(res?JSON.parse(res.value):[]);}catch(_){setTasks([]);}
        showToast('ارتباط با سرور برقرار نشد؛ اطلاعات محلی نمایش داده شد');setLoaded(true);
      }
    }
  },[currentUser]);

  useEffect(()=>{if(!currentUser)return;loadTasks();const iv=setInterval(loadTasks,currentUser.role==='manager'?30000:15000);return()=>clearInterval(iv);},[currentUser,loadTasks]);

  const saveTasks=async updater=>{const next=updater(tasks);try{await window.storage.set('tasks',JSON.stringify(next),true);}catch(e){}setTasks(next);return next;};

  const updateManagerTask=async(id,patch)=>{
    const original=tasks.find(t=>t.id===id);if(!original)return;
    const updated={...original,...patch,managerNote:patch.managerNote!==undefined?(patch.managerNote||original.managerNote):original.managerNote};
    setTasks(list=>list.map(t=>t.id===id?updated:t));
    try{await sendManagerUpdate(updated,currentUser.token);setTimeout(loadTasks,900);}catch(e){showToast('ارسال تغییرات انجام نشد');}
  };

  if(!currentUser)return React.createElement(LoginView,{onLogin:handleLogin});

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'top'},
      React.createElement('div',{className:'brand'},React.createElement('span',{className:'dot'}),React.createElement('div',null,React.createElement('h1',null,'پشتیبانی فنی فروشگاه‌ها'),React.createElement('span',null,role==='tech'?'محیط نیروی فنی':'مرکز کنترل مدیریت فنی'))),
      React.createElement('div',{className:'user-bar'},React.createElement('div',{className:'user-info'},React.createElement('b',null,currentUser.name),React.createElement('span',null,role==='manager'?'مدیر فنی':'کد پرسنلی: '+currentUser.username)),React.createElement('button',{className:'logout-btn',onClick:logout},'خروج'))
    ),
    !loaded?React.createElement('div',{className:'empty'},'در حال بارگذاری اطلاعات...'):(role==='tech'?React.createElement(TechView,{tasks,saveTasks,showToast,currentUser,refreshTasks:loadTasks}):React.createElement(ManagerView,{tasks,updateTask:updateManagerTask,showToast,refreshTasks:loadTasks,managerLoading,lastUpdated})),
    React.createElement(Toast,{msg:toastMsg})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
